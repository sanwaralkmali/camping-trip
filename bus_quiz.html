<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#2d6a4f">
<title>Bus Quiz Challenge · تحدي الباص</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;500;600;700&family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --forest:       #2d6a4f;
  --forest-dark:  #1b4332;
  --forest-light: #52b788;
  --forest-soft:  #d8f3dc;
  --amber:        #f4a261;
  --amber-dark:   #e76f51;
  --gold:         #ffd166;
  --gold-dark:    #eaa93b;
  --cream:        #fefae0;
  --cream-dark:   #faedcd;
  --brown:        #5a3e2b;
  --brown-dark:   #3c2817;
  --ink:          #1a1a1a;
  --ink-soft:     #4a4a4a;
  --white:        #ffffff;
  --shadow:       0 4px 16px rgba(26, 26, 26, 0.08);
  --shadow-lg:    0 12px 40px rgba(26, 26, 26, 0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Nunito', 'Readex Pro', system-ui, -apple-system, sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  line-height: 1.5;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 10% 10%, rgba(244, 162, 97, 0.10), transparent 55%),
    radial-gradient(circle at 90% 90%, rgba(45, 106, 79, 0.08), transparent 55%),
    radial-gradient(circle at 50% 0%, rgba(255, 209, 102, 0.10), transparent 40%);
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 680px;
  margin: 0 auto;
  padding: 16px 16px 120px;
}

/* ==================== HEADER ==================== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 4px 4px;
  flex-wrap: wrap;
}
.header-left { min-width: 0; }
.header-title {
  font-family: 'Fredoka One', 'Readex Pro', sans-serif;
  font-size: 24px;
  color: var(--forest-dark);
  line-height: 1.05;
  letter-spacing: -0.02em;
}
.header-sub {
  font-family: 'Readex Pro', sans-serif;
  font-size: 13px;
  color: var(--brown);
  margin-top: 3px;
  font-weight: 700;
  direction: rtl;
}

.candy-badge {
  background: linear-gradient(135deg, var(--gold), var(--amber));
  color: var(--brown-dark);
  padding: 10px 16px;
  border-radius: 999px;
  font-weight: 900;
  font-size: 16px;
  box-shadow: 0 4px 12px rgba(244, 162, 97, 0.35);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: transform 0.3s cubic-bezier(.34, 1.56, .64, 1);
  font-family: 'Fredoka One', sans-serif;
}
.candy-badge.pop { transform: scale(1.25) rotate(-3deg); }

/* ==================== LANG TOGGLE ==================== */
.lang-bar { display: flex; justify-content: center; margin: 10px 0 6px; }
.lang-toggle {
  display: inline-flex;
  background: var(--white);
  border: 2px solid var(--forest-soft);
  border-radius: 999px;
  padding: 4px;
  gap: 2px;
  box-shadow: var(--shadow);
}
.lang-toggle button {
  border: none;
  background: transparent;
  font-family: 'Nunito', 'Readex Pro', sans-serif;
  font-weight: 800;
  font-size: 13px;
  padding: 10px 16px;
  border-radius: 999px;
  cursor: pointer;
  color: var(--forest);
  transition: all 0.2s ease;
  min-height: 40px;
  letter-spacing: 0.02em;
}
.lang-toggle button.on {
  background: var(--forest);
  color: var(--cream);
  box-shadow: 0 2px 8px rgba(45, 106, 79, 0.4);
}
.lang-toggle button:active { transform: scale(0.92); }

/* ==================== HERO ==================== */
.hero {
  text-align: center;
  padding: 16px 0 8px;
}
.hero-emoji {
  font-size: 64px;
  line-height: 1;
  display: inline-block;
  animation: bounce 2.5s ease-in-out infinite;
  filter: drop-shadow(0 6px 8px rgba(90, 62, 43, 0.18));
}
@keyframes bounce {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-8px) rotate(3deg); }
}
.hero-tag {
  font-family: 'Fredoka One', sans-serif;
  font-size: 22px;
  color: var(--brown-dark);
  margin-top: 10px;
  letter-spacing: -0.01em;
}
.hero-tag-ar {
  font-family: 'Readex Pro', sans-serif;
  font-size: 18px;
  color: var(--forest);
  font-weight: 800;
  margin-top: 2px;
  direction: rtl;
}

/* ==================== CATEGORY GRID ==================== */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
  margin-top: 18px;
}
@media (min-width: 720px) {
  .cat-grid { grid-template-columns: repeat(3, 1fr); }
}
.cat-card {
  background: var(--white);
  border-radius: 22px;
  padding: 20px 14px 16px;
  text-align: center;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: transform 0.25s cubic-bezier(.34, 1.56, .64, 1), box-shadow 0.25s ease;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-height: 170px;
  position: relative;
  overflow: hidden;
  border: 2px solid transparent;
}
.cat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 5px;
  background: var(--cat-color, var(--forest));
  border-radius: 0 0 3px 3px;
}
.cat-card:active {
  transform: scale(0.94);
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
}
.cat-card:hover { box-shadow: var(--shadow-lg); }

.cat-emoji {
  font-size: 48px;
  line-height: 1;
  margin-top: 6px;
  filter: drop-shadow(0 3px 4px rgba(0, 0, 0, 0.08));
}
.cat-name-en {
  font-family: 'Fredoka One', sans-serif;
  font-size: 16px;
  color: var(--ink);
  letter-spacing: -0.01em;
  line-height: 1.2;
}
.cat-name-ar {
  font-family: 'Readex Pro', sans-serif;
  font-size: 15px;
  color: var(--cat-color, var(--forest));
  font-weight: 800;
  direction: rtl;
  line-height: 1.3;
}
.cat-count {
  margin-top: auto;
  display: inline-flex;
  justify-content: center;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--brown);
  font-weight: 800;
  padding: 5px 12px;
  background: var(--cream-dark);
  border-radius: 999px;
  align-self: center;
  letter-spacing: 0.02em;
  font-family: 'Nunito', sans-serif;
}
.cat-card.all-done { opacity: 0.7; }
.cat-card.all-done .cat-count { background: var(--forest); color: var(--cream); }

.cat-progress {
  position: absolute;
  bottom: 4px;
  left: 8px; right: 8px;
  height: 3px;
  background: #ece4c6;
  border-radius: 999px;
  overflow: hidden;
}
.cat-progress-fill {
  height: 100%;
  background: var(--cat-color, var(--forest));
  transition: width 0.4s ease;
  border-radius: 999px;
}

/* ==================== RESET ==================== */
.reset-btn {
  margin: 28px auto 8px;
  display: block;
  background: transparent;
  border: 1.5px solid #d8d1b5;
  color: var(--brown);
  padding: 10px 24px;
  border-radius: 999px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.reset-btn:hover, .reset-btn:active {
  background: var(--cream-dark);
  border-color: var(--amber);
  color: var(--amber-dark);
  transform: scale(0.97);
}

.foot-credit {
  text-align: center;
  margin-top: 18px;
  color: var(--brown);
  font-size: 11px;
  opacity: 0.55;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* ==================== QUESTION SCREEN ==================== */
.q-screen { animation: fadeUp 0.4s cubic-bezier(.22, .8, .3, 1); }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.q-topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 4px;
  gap: 10px;
  margin-bottom: 12px;
}
.back-btn {
  background: var(--white);
  border: none;
  padding: 10px 16px;
  border-radius: 999px;
  font-family: 'Fredoka One', sans-serif;
  font-size: 14px;
  color: var(--forest-dark);
  cursor: pointer;
  box-shadow: var(--shadow);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: transform 0.2s;
  min-height: 44px;
}
.back-btn:active { transform: scale(0.94); }

.q-count {
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  color: var(--brown);
  font-weight: 800;
  background: var(--cream-dark);
  padding: 8px 14px;
  border-radius: 999px;
  letter-spacing: 0.02em;
}

/* question card */
.q-card {
  background: var(--white);
  border-radius: 26px;
  padding: 22px 22px 22px;
  box-shadow: var(--shadow-lg);
  position: relative;
  overflow: hidden;
  animation: slideUp 0.35s cubic-bezier(.22, .8, .3, 1);
  user-select: none;
  border-top: 6px solid var(--cat-color, var(--forest));
}
@keyframes slideUp {
  from { opacity: 0; transform: scale(0.97) translateY(12px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.q-category {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--white);
  padding: 7px 14px;
  border-radius: 999px;
  font-family: 'Fredoka One', sans-serif;
  font-size: 14px;
  letter-spacing: 0.02em;
  margin-bottom: 18px;
  box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
}
.q-category .ar {
  font-family: 'Readex Pro', sans-serif;
  font-weight: 800;
  direction: rtl;
}
.q-category .dot { opacity: 0.6; }

/* ===== FLAG BLOCK (images in questions) ===== */
.flag-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  margin: 10px 0 20px;
  padding: 22px 16px;
  background: linear-gradient(135deg, #f5f0dd, var(--cream));
  border-radius: 20px;
  border: 2px dashed rgba(45, 106, 79, 0.2);
}
.flag-img-wrap {
  position: relative;
  cursor: zoom-in;
  display: inline-block;
  transition: transform 0.2s ease;
}
.flag-img-wrap:active { transform: scale(0.97); }
.flag-img {
  display: block;
  max-width: 320px;
  width: 100%;
  height: auto;
  border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25), 0 2px 6px rgba(0, 0, 0, 0.12);
  border: 3px solid var(--white);
  background: #f0ead8;
  aspect-ratio: 3 / 2;
  object-fit: cover;
}
.flag-img.loading {
  background: linear-gradient(90deg, #e8e1c4, #f0ead8, #e8e1c4);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.flag-img-fallback {
  font-size: 140px;
  line-height: 1;
  display: none;
  filter: drop-shadow(0 6px 12px rgba(0,0,0,0.18));
}
.flag-img-wrap.failed .flag-img { display: none; }
.flag-img-wrap.failed .flag-img-fallback { display: block; }
.flag-zoom-hint {
  font-family: 'Nunito', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--brown);
  letter-spacing: 0.04em;
  background: var(--white);
  padding: 6px 14px;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}
.flag-zoom-hint-ar {
  font-family: 'Readex Pro', sans-serif;
  font-weight: 700;
  direction: rtl;
}
.flag-meta {
  font-family: 'JetBrains Mono', 'Nunito', monospace, sans-serif;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-soft);
  font-weight: 700;
  opacity: 0.7;
}

/* ===== REVERSE-WORDS LETTERS BLOCK ===== */
.letters-block {
  margin: 12px 0 20px;
  padding: 26px 24px;
  background: linear-gradient(135deg, var(--forest-dark), var(--forest));
  border-radius: 22px;
  text-align: center;
  box-shadow: 0 12px 30px rgba(45, 106, 79, 0.35);
  position: relative;
  overflow: hidden;
}
.letters-block::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 140px; height: 140px;
  background: radial-gradient(circle, rgba(255, 209, 102, 0.18), transparent 70%);
}
.letters-label {
  font-family: 'Fredoka One', sans-serif;
  font-size: 12px;
  color: var(--gold);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.letters-label-ar {
  font-family: 'Readex Pro', sans-serif;
  font-weight: 800;
  font-size: 14px;
  color: var(--cream);
  margin-bottom: 14px;
  direction: rtl;
  opacity: 0.85;
}
.letters {
  font-family: 'Readex Pro', sans-serif;
  font-size: 42px;
  font-weight: 900;
  color: var(--cream);
  direction: rtl;
  line-height: 1.6;
  letter-spacing: 0.05em;
  word-spacing: 0.15em;
  text-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
  position: relative;
}

.q-en {
  font-family: 'Nunito', sans-serif;
  font-size: 22px;
  font-weight: 800;
  color: var(--ink);
  line-height: 1.4;
  margin-bottom: 16px;
  letter-spacing: -0.01em;
}

.q-ar-box {
  background: var(--forest-soft);
  border-radius: 18px;
  padding: 16px 20px;
  border-right: 5px solid var(--forest);
}
.q-ar {
  font-family: 'Readex Pro', sans-serif;
  font-size: 21px;
  font-weight: 600;
  line-height: 1.75;
  color: var(--forest-dark);
  direction: rtl;
  text-align: right;
}

.reveal-btn {
  width: 100%;
  margin-top: 22px;
  background: linear-gradient(135deg, var(--forest), var(--forest-dark));
  color: var(--white);
  border: none;
  padding: 18px;
  border-radius: 18px;
  font-family: 'Fredoka One', sans-serif;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 8px 22px rgba(45, 106, 79, 0.4);
  transition: all 0.2s cubic-bezier(.34, 1.56, .64, 1);
  min-height: 60px;
  letter-spacing: 0.01em;
}
.reveal-btn:active {
  transform: scale(0.97);
  box-shadow: 0 3px 8px rgba(45, 106, 79, 0.4);
}

/* answer box */
.ans-box {
  margin-top: 20px;
  background: linear-gradient(135deg, var(--gold), var(--amber));
  border-radius: 18px;
  padding: 20px 22px;
  box-shadow: 0 10px 30px rgba(244, 162, 97, 0.45);
  animation: answerPop 0.4s cubic-bezier(.34, 1.56, .64, 1);
  position: relative;
  overflow: hidden;
}
.ans-box::before {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 100px; height: 100px;
  background: radial-gradient(circle, rgba(255, 255, 255, 0.3), transparent 70%);
  border-radius: 50%;
}
@keyframes answerPop {
  0% { opacity: 0; transform: scale(0.8) translateY(-10px); }
  60% { transform: scale(1.03) translateY(0); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}
.ans-label {
  font-family: 'Fredoka One', sans-serif;
  font-size: 12px;
  color: var(--brown-dark);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 8px;
  position: relative;
}
.ans-en {
  font-family: 'Fredoka One', sans-serif;
  font-size: 22px;
  color: var(--brown-dark);
  line-height: 1.3;
  margin-bottom: 10px;
  letter-spacing: -0.01em;
  position: relative;
}
.ans-ar {
  font-family: 'Readex Pro', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: var(--brown-dark);
  direction: rtl;
  text-align: right;
  line-height: 1.7;
  padding-top: 10px;
  border-top: 2px dashed rgba(90, 62, 43, 0.35);
  position: relative;
}

/* lang modes — but flags & letters always show */
body.lang-en .q-ar-box,
body.lang-en .ans-ar,
body.lang-en .q-category .ar,
body.lang-en .q-category .dot,
body.lang-en .letters-label-ar,
body.lang-en .flag-zoom-hint-ar { display: none; }

body.lang-ar .q-en,
body.lang-ar .ans-en,
body.lang-ar .q-category .en,
body.lang-ar .q-category .dot,
body.lang-ar .letters-label,
body.lang-ar .flag-zoom-hint-en { display: none; }

body.lang-ar .q-ar-box {
  background: var(--white);
  border: 2px solid var(--forest-soft);
  border-right: 6px solid var(--cat-color, var(--forest));
  padding: 22px 24px;
  box-shadow: var(--shadow);
}
body.lang-ar .q-ar { font-size: 26px; color: var(--ink); font-weight: 700; }
body.lang-ar .ans-ar {
  border-top: none;
  padding-top: 0;
  font-size: 24px;
}
body.lang-en .q-ar-box { display: none; }

/* ==================== FIXED ACTIONS ==================== */
.actions {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(to top, var(--cream) 78%, rgba(254, 250, 224, 0));
  padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
  display: grid;
  grid-template-columns: 1fr 1.4fr 1fr;
  gap: 8px;
  z-index: 10;
  max-width: 680px;
  margin: 0 auto;
}
.action-btn {
  border: none;
  padding: 14px 10px;
  border-radius: 16px;
  font-family: 'Fredoka One', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: transform 0.15s cubic-bezier(.34, 1.56, .64, 1), filter 0.2s, opacity 0.2s;
  min-height: 56px;
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  white-space: nowrap;
  line-height: 1.1;
}
.action-btn span.lbl { font-size: 12px; opacity: 0.9; font-weight: 600; }
.action-btn:active { transform: scale(0.93); }
.action-btn.skip {
  background: var(--cream-dark);
  color: var(--brown-dark);
  border: 2px solid #e0d5b0;
}
.action-btn.candy {
  background: linear-gradient(135deg, var(--gold), var(--amber));
  color: var(--brown-dark);
  box-shadow: 0 8px 24px rgba(244, 162, 97, 0.45);
  font-size: 17px;
}
.action-btn.candy:disabled {
  opacity: 0.4;
  filter: saturate(0.4);
  cursor: not-allowed;
  box-shadow: none;
}
.action-btn.switch {
  background: var(--white);
  color: var(--forest-dark);
  border: 2px solid var(--forest-soft);
}

/* ==================== EMPTY STATE ==================== */
.empty {
  text-align: center;
  padding: 44px 20px;
  background: var(--white);
  border-radius: 26px;
  box-shadow: var(--shadow);
  margin-top: 24px;
  animation: fadeUp 0.4s ease;
}
.empty-emoji { font-size: 64px; margin-bottom: 14px; line-height: 1; }
.empty-title {
  font-family: 'Fredoka One', sans-serif;
  font-size: 22px;
  color: var(--forest-dark);
  margin-bottom: 4px;
  line-height: 1.3;
}
.empty-title-ar {
  font-family: 'Readex Pro', sans-serif;
  font-size: 18px;
  color: var(--brown);
  font-weight: 800;
  margin-bottom: 22px;
  direction: rtl;
}
.empty-btn {
  background: var(--forest);
  color: var(--cream);
  border: none;
  padding: 14px 28px;
  border-radius: 16px;
  font-family: 'Fredoka One', sans-serif;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 6px 18px rgba(45, 106, 79, 0.4);
  transition: transform 0.2s;
  min-height: 52px;
}
.empty-btn:active { transform: scale(0.95); }

/* ==================== IMAGE VIEWER ==================== */
.img-viewer {
  position: fixed;
  inset: 0;
  background: rgba(10, 10, 10, 0.96);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  padding: 20px;
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
}
.img-viewer.on {
  display: flex;
  animation: viewerFadeIn 0.25s ease;
}
@keyframes viewerFadeIn { from { opacity: 0; } to { opacity: 1; } }
.img-viewer-img {
  max-width: 95%;
  max-height: calc(100vh - 180px);
  width: auto;
  height: auto;
  border-radius: 12px;
  box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
  animation: viewerImgIn 0.35s cubic-bezier(.34, 1.56, .64, 1);

/* =========================================
   STATE
   ========================================= */
const LS_CANDY  = 'bq3:candy';
const LS_USED   = 'bq3:used:';
const LS_LANG   = 'bq3:lang';

const state = {
  candy: parseInt(localStorage.getItem(LS_CANDY) || '0', 10),
  lang: localStorage.getItem(LS_LANG) || 'both',
  currentCategory: null,
  currentQuestion: null,
  answerRevealed: false,
  candyLocked: false,
};

/* =========================================
   HELPERS
   ========================================= */
function usedSet(catId) {
  const raw = localStorage.getItem(LS_USED + catId);
  return new Set(raw ? raw.split(',').filter(Boolean) : []);
}
function markUsed(catId, qid) {
  const s = usedSet(catId);
  s.add(qid);
  localStorage.setItem(LS_USED + catId, Array.from(s).join(','));
}
function unusedQuestions(cat) {
  const used = usedSet(cat.id);
  return cat.questions.filter(q => !used.has(q.id));
}
function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, m => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[m]));
}

/* =========================================
   LANG
   ========================================= */
function applyLang(lang) {
  state.lang = lang;
  localStorage.setItem(LS_LANG, lang);
  document.body.classList.remove('lang-both', 'lang-en', 'lang-ar');
  document.body.classList.add('lang-' + lang);
  document.querySelectorAll('.lang-toggle button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });
}

/* =========================================
   CANDY
   ========================================= */
function updateCandyBadge() {
  document.getElementById('candy-count').textContent = state.candy;
}
function awardCandy(evt) {
  if (state.candyLocked || !state.answerRevealed) return;
  state.candyLocked = true;
  state.candy++;
  localStorage.setItem(LS_CANDY, state.candy);
  updateCandyBadge();
  if (evt & evt.clientX) spawnCandyFloat(evt.clientX, evt.clientY);
  const badge = document.getElementById('candy-badge');
  badge.classList.add('pop');
  setTimeout(() => badge.classList.remove('pop'), 320);
  setTimeout(() => { nextQuestion(); state.candyLocked = false; }, 420);
}
function spawnCandyFloat(x, y) {
  const el = document.createElement('div');
  el.className = 'candy-float';
  el.textContent = '🍬';
  el.style.left = (x - 16) + 'px';
  el.style.top = (y - 16) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

/* =========================================
   HOME
   ========================================= */
function showHome() {
  document.getElementById('home-screen').classList.remove('hidden');
  document.getElementById('q-screen').classList.add('hidden');
  state.currentCategory = null;
  state.currentQuestion = null;
  state.answerRevealed = false;
  renderCategories();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderCategories() {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = '';
  QUIZ_DATA.categories.forEach(cat => {
    const used = usedSet(cat.id).size;
    const total = cat.questions.length;
    const allDone = total > 0 & used === total;
    const pct = total ? Math.round((used / total) * 100) : 0;
    const card = document.createElement('div');
    card.className = 'cat-card' + (allDone ? ' all-done' : '');
    card.style.setProperty('--cat-color', cat.color);
    card.onclick = () => openCategory(cat.id);
    card.innerHTML = `
      <div class="cat-emoji">${cat.emoji}</div>
      <div class="cat-name-en">${escapeHtml(cat.name_en)}</div>
      <div class="cat-name-ar">${escapeHtml(cat.name_ar)}</div>
      <div class="cat-count">${used} / ${total}${allDone ? ' ✓' : ''}</div>
      <div class="cat-progress"><div class="cat-progress-fill" style="width:${pct}%"></div></div>
    `;
    grid.appendChild(card);
  });
}

/* =========================================
   QUESTION FLOW
   ========================================= */
function openCategory(catId) {
  const cat = QUIZ_DATA.categories.find(c => c.id === catId);
  if (!cat) return;
  state.currentCategory = cat;
  document.getElementById('home-screen').classList.add('hidden');
  document.getElementById('q-screen').classList.remove('hidden');
  nextQuestion();
  window.scrollTo({ top: 0 });
}
function nextQuestion() {
  const cat = state.currentCategory;
  if (!cat) return;
  const unused = unusedQuestions(cat);
  if (unused.length === 0) { showEmpty(cat); return; }
  const q = pickRandom(unused);
  state.currentQuestion = q;
  state.answerRevealed = false;
  renderQuestion(q, cat);
  updateQCount();
  document.getElementById('candy-btn').disabled = true;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function updateQCount() {
  const cat = state.currentCategory;
  if (!cat) return;
  const used = usedSet(cat.id).size;
  document.getElementById('q-count').textContent = `${used} / ${cat.questions.length}`;
}

/* -----------------------------------------
   Per-question "extra" block
   (flag image for flags category,
    letters block for reverse_words)
   ----------------------------------------- */
function buildExtraBlock(q) {
  // Flag image?
  if (q.flag_image_url || q.flag_emoji) {
    const label = q.type === 'identify_capital'
      ? { en: 'Identify the Capital', ar: 'حدّد العاصمة' }
      : { en: 'Identify the Country', ar: 'حدّد الدولة' };
    const imgUrl = q.flag_image_url ? escapeHtml(q.flag_image_url) : '';
    const code = q.flag_code ? q.flag_code.toUpperCase() : '';
    const emoji = q.flag_emoji || '🏳️';
    return `
      <div class="flag-block">
        <div class="flag-meta">${escapeHtml(label.en)} · ${escapeHtml(label.ar)}${code ? ' · ' + escapeHtml(code) : ''}</div>
        <div class="flag-img-wrap" data-flag-emoji="${escapeHtml(emoji)}"
             onclick="openImgViewer('${imgUrl}', '${escapeHtml(emoji)}')">
          ${imgUrl ? `<img class="flag-img loading" src="${imgUrl}" alt="Flag"
             onload="this.classList.remove('loading')"
             onerror="this.parentElement.classList.add('failed')" />` : ''}
          <div class="flag-img-fallback">${escapeHtml(emoji)}</div>
        </div>
        <div class="flag-zoom-hint">
          <span>🔍</span>
          <span class="flag-zoom-hint-en">Tap to enlarge</span>
          <span class="flag-zoom-hint-ar">اضغط للتكبير</span>
        </div>
      </div>
    `;
  }
  // Reverse-words letters?
  if (q.letters_reversed) {
    return `
      <div class="letters-block">
        <div class="letters-label">Reversed Letters</div>
        <div class="letters-label-ar">الحروف بالترتيب المعكوس</div>
        <div class="letters">${escapeHtml(q.letters_reversed)}</div>
      </div>
    `;
  }
  return '';
}

function renderQuestion(q, cat) {
  const slot = document.getElementById('q-card-slot');
  slot.innerHTML = `
    <div class="q-card" id="q-card" style="--cat-color:${cat.color}">
      <div class="q-category" style="background:${cat.color}">
        <span>${cat.emoji}</span>
        <span class="en">${escapeHtml(cat.name_en)}</span>
        <span class="dot">·</span>
        <span class="ar">${escapeHtml(cat.name_ar)}</span>
      </div>
      ${buildExtraBlock(q)}
      <div class="q-en">${escapeHtml(q.q_en)}</div>
      <div class="q-ar-box"><div class="q-ar">${escapeHtml(q.q_ar)}</div></div>
      <button class="reveal-btn" id="reveal-btn" onclick="event.stopPropagation(); revealAnswer();">
        🎯 Reveal Answer · اكشف الجواب
      </button>
    </div>
  `;
  // Tap on card body reveals (but not on flag image or buttons)
  document.getElementById('q-card').addEventListener('click', (e) => {
    if (e.target.closest('button, .flag-img-wrap, .img-viewer')) return;
    revealAnswer();
  });
}

function revealAnswer() {
  if (state.answerRevealed) return;
  const q = state.currentQuestion;
  if (!q) return;
  state.answerRevealed = true;

  const btn = document.getElementById('reveal-btn');
  if (btn) btn.style.display = 'none';

  const card = document.getElementById('q-card');
  if (!card) return;
  const ans = document.createElement('div');
  ans.className = 'ans-box';
  ans.innerHTML = `
    <div class="ans-label">✓ Answer · الجواب</div>
    <div class="ans-en">${escapeHtml(q.a_en)}</div>
    <div class="ans-ar">${escapeHtml(q.a_ar)}</div>
  `;
  card.appendChild(ans);

  markUsed(state.currentCategory.id, q.id);
  updateQCount();
  document.getElementById('candy-btn').disabled = false;
}

/* =========================================
   EMPTY STATE
   ========================================= */
function showEmpty(cat) {
  document.getElementById('q-card-slot').innerHTML = `
    <div class="empty">
      <div class="empty-emoji">🎉</div>
      <div class="empty-title">All ${cat.questions.length} ${cat.name_en} questions are done!</div>
      <div class="empty-title-ar">انتهت جميع أسئلة ${escapeHtml(cat.name_ar)}</div>
      <button class="empty-btn" onclick="resetCategory('${cat.id}')">🔄 Reset this category · إعادة هذه الفئة</button>
    </div>
  `;
  document.getElementById('q-count').textContent = `${cat.questions.length} / ${cat.questions.length}`;
  document.getElementById('candy-btn').disabled = true;
}
function resetCategory(catId) {
  localStorage.removeItem(LS_USED + catId);
  nextQuestion();
}
function resetAllProgress() {
  if (!confirm('Reset ALL progress and the candy counter?\nإعادة ضبط كل التقدم وعدّاد الحلوى؟')) return;
  QUIZ_DATA.categories.forEach(c => localStorage.removeItem(LS_USED + c.id));
  state.candy = 0;
  localStorage.setItem(LS_CANDY, '0');
  updateCandyBadge();
  renderCategories();
}

/* =========================================
   IMAGE VIEWER (full-screen)
   ========================================= */
function openImgViewer(url, emoji) {
  const v = document.getElementById('img-viewer');
  const img = document.getElementById('img-viewer-img');
  const cap = document.getElementById('img-viewer-caption');
  const capAr = document.getElementById('img-viewer-caption-ar');

  // Populate caption from current question (country + capital names)
  const q = state.currentQuestion;
  if (q) {
    cap.textContent = q.a_en || emoji || '';
    capAr.textContent = q.a_ar || '';
    // Hide captions BEFORE the answer is revealed (otherwise viewer spoils it)
    if (!state.answerRevealed) {
      cap.textContent = emoji || '';
      capAr.textContent = '';
    }
  } else {
    cap.textContent = emoji || '';
    capAr.textContent = '';
  }

  if (url) {
    img.src = url;
    img.style.display = 'block';
    img.onerror = () => {
      img.style.display = 'none';
      cap.textContent = emoji + ' ' + cap.textContent;
    };
  } else {
    img.style.display = 'none';
    cap.textContent = emoji + ' ' + cap.textContent;
  }
  v.classList.add('on');
  document.body.style.overflow = 'hidden';
}
function closeImgViewer(e, force) {
  // Allow click outside image to close, but not clicks on the image itself
  if (e & !force & e.target.tagName === 'IMG') return;
  document.getElementById('img-viewer').classList.remove('on');
  document.body.style.overflow = '';
}

/* =========================================
   FLAG IMAGE PRE-LOAD (for offline use)
   ========================================= */
function preloadFlagImages() {
  let count = 0;
  QUIZ_DATA.categories.forEach(cat => {
    cat.questions.forEach(q => {
      if (q.flag_image_url) {
        const img = new Image();
        img.src = q.flag_image_url;
        count++;
      }
    });
  });
  if (count > 0) console.log('[bus-quiz] Preloading ' + count + ' flag images for offline use…');
}

/* =========================================
   KEYBOARD SHORTCUTS
   ========================================= */
document.addEventListener('keydown', e => {
  // Close viewer first
  if (document.getElementById('img-viewer').classList.contains('on')) {
    if (e.key === 'Escape') closeImgViewer(null, true);
    return;
  }
  if (document.getElementById('q-screen').classList.contains('hidden')) return;
  const tag = (e.target & e.target.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (e.code === 'Space' || e.key === ' ') {
    e.preventDefault();
    if (!state.answerRevealed) revealAnswer(); else nextQuestion();
  } else if (e.key === 'ArrowRight') {
    e.preventDefault(); nextQuestion();
  } else if (e.key === 'Escape') {
    showHome();
  } else if (e.key.toLowerCase() === 'c' & state.answerRevealed) {
    awardCandy();
  } else if (e.key.toLowerCase() === 'z' & state.currentQuestion) {
    // Quick shortcut: zoom current flag if any
    const q = state.currentQuestion;
    if (q & (q.flag_image_url || q.flag_emoji)) {
      openImgViewer(q.flag_image_url || '', q.flag_emoji || '🏳️');
    }
  }
});

/* =========================================
   INIT
   ========================================= */
document.querySelectorAll('.lang-toggle button').forEach(btn => {
  btn.addEventListener('click', () => applyLang(btn.dataset.lang));
});
applyLang(state.lang);
updateCandyBadge();
showHome();

// Preload flags after first paint (so home is instant)
if ('requestIdleCallback' in window) {
  requestIdleCallback(preloadFlagImages, { timeout: 2000 });
} else {
  setTimeout(preloadFlagImages, 1200);
}
